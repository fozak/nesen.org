<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Letter Monograms – nesen Style</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <style>
    :root {
      --radius: 14px;
      --tile-size: 52px;
      --gap: 28px;
      --text-dark: #111827;
      --text-muted: #6b7280;
      
      /* nesen Brand Colors */
      --blue-primary: #2446C8;
      --blue-secondary: #82A0FA;
      --accent-teal: #4FD1C5;
      --accent-coral: #FF6F61;
      --neutral-gray: #4B5563;
      --amber: #F59E0B;
      --green: #10B981;
      --purple: #8B5CF6;
    }
    
    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #ffffff;
      color: var(--text-dark);
      padding: 40px;
    }
    
    h1 {
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 32px;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--gap);
    }
    
    .item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    
    .icon {
      width: var(--tile-size);
      height: var(--tile-size);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
    }
    
    .icon svg {
      width: 32px;
      height: 32px;
    }
    
    .content {
      line-height: 1.2;
    }
    
    .title {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 6px;
    }
    
    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }
    
    /* Color Classes */
    .blue { background: var(--blue-primary); }
    .blue-secondary { background: var(--blue-secondary); }
    .teal { background: var(--accent-teal); }
    .coral { background: var(--accent-coral); }
    .amber { background: var(--amber); }
    .green { background: var(--green); }
    .purple { background: var(--purple); }
    .gray { background: var(--neutral-gray); }
  </style>
</head>
<body>
  <h1>Letter Monograms</h1>
  
  <div class="grid">
    
    <!-- D - with top right cut -->
    <div class="item">
      <div class="icon blue">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 6 H16 C22 6 26 10 26 16 C26 22 22 26 16 26 H8 V6 Z" 
                stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="22" cy="10" r="4" fill="#2446C8"/>
        </svg>
      </div>
      <div class="content">
        <div class="title">Dashboard</div>
        <div class="subtitle">Main interface</div>
      </div>
    </div>
    
    <!-- E - with middle gap -->
    <div class="item">
      <div class="icon green">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 6 H24 M10 6 V26 M10 26 H24" 
                stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="16" cy="16" r="2.5" fill="#10B981"/>
        </svg>
      </div>
      <div class="content">
        <div class="title">Events</div>
        <div class="subtitle">Event management</div>
      </div>
    </div>
    
    <!-- F - Frappe style with bottom right missing -->
    <div class="item">
      <div class="icon coral">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 6 H24 M10 6 V26 M10 14 H20" 
                stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="22" cy="22" r="4" fill="#FF6F61"/>
        </svg>
      </div>
      <div class="content">
        <div class="title">Forms</div>
        <div class="subtitle">Data collection</div>
      </div>
    </div>
    
    <!-- H - with center notch -->
    <div class="item">
      <div class="icon teal">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 6 V26 M24 6 V26 M8 16 H24" 
                stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="14" y="14" width="4" height="4" fill="#4FD1C5"/>
        </svg>
      </div>
      <div class="content">
        <div class="title">Hub</div>
        <div class="subtitle">Central connection</div>
      </div>
    </div>
    
    <!-- I - with top and bottom cuts -->
    <div class="item">
      <div class="icon purple">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 8 V24" 
                stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="16" cy="6" r="2" fill="#8B5CF6"/>
          <circle cx="16" cy="26" r="2" fill="#8B5CF6"/>
        </svg>
      </div>
      <div class="content">
        <div class="title">Insights</div>
        <div class="subtitle">Intelligence</div>
      </div>
    </div>
    
    <!-- G - with open right side -->
    <div class="item">
      <div class="icon amber">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 12 C24 8 21 6 16 6 C11 6 8 9 8 16 C8 23 11 26 16 26 C21 26 24 24 24 20 M24 20 H18" 
                stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="26" cy="16" r="2" fill="#F59E0B"/>
        </svg>
      </div>
      <div class="content">
        <div class="title">Gateway</div>
        <div class="subtitle">Access portal</div>
      </div>
    </div>
    
    <!-- L - with bottom right gap -->
    <div class="item">
      <div class="icon blue-secondary">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 6 V26 H24" 
                stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="22" cy="24" r="3" fill="#82A0FA"/>
        </svg>
      </div>
      <div class="content">
        <div class="title">Library</div>
        <div class="subtitle">Resource center</div>
      </div>
    </div>
    
    <!-- M - with center valley cut -->
    <div class="item">
      <div class="icon green">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 26 V6 L16 16 L26 6 V26" 
                stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="16" cy="16" r="2.5" fill="#10B981"/>
        </svg>
      </div>
      <div class="content">
        <div class="title">Members</div>
        <div class="subtitle">User directory</div>
      </div>
    </div>
    
    <!-- N - with diagonal gap -->
    <div class="item">
      <div class="icon coral">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 26 V6 L24 26 V6" 
                stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="16" cy="16" r="2.5" fill="#FF6F61"/>
        </svg>
      </div>
      <div class="content">
        <div class="title">Network</div>
        <div class="subtitle">Connections</div>
      </div>
    </div>
    
    <!-- R - with leg cut -->
    <div class="item">
      <div class="icon blue">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 6 V26 M8 6 H16 C20 6 22 8 22 12 C22 16 20 18 16 18 H8 M16 18 L22 26" 
                stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="20" cy="24" r="3" fill="#2446C8"/>
        </svg>
      </div>
      <div class="content">
        <div class="title">Reports</div>
        <div class="subtitle">Analytics</div>
      </div>
    </div>
    
    <!-- T - with top cuts -->
    <div class="item">
      <div class="icon teal">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 8 V26 M6 8 H26" 
                stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="10" cy="8" r="2.5" fill="#4FD1C5"/>
          <circle cx="22" cy="8" r="2.5" fill="#4FD1C5"/>
        </svg>
      </div>
      <div class="content">
        <div class="title">Tickets</div>
        <div class="subtitle">Support system</div>
      </div>
    </div>
    
    <!-- U - with bottom gap -->
    <div class="item">
      <div class="icon purple">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 6 V18 C8 23 11 26 16 26 C21 26 24 23 24 18 V6" 
                stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="16" cy="24" r="3" fill="#8B5CF6"/>
        </svg>
      </div>
      <div class="content">
        <div class="title">Users</div>
        <div class="subtitle">Account management</div>
      </div>
    </div>
    
  </div>
</body>
</html>
